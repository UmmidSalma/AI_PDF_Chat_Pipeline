<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9fafc; --surface: #ffffff; --surface2: #f4f6fb; --surface3: #e7ecf5;
    --border: rgba(15,23,42,0.08); --border2: rgba(15,23,42,0.12);
    --text: #0f172a; --text2: #475569; --text3: #94a3b8;
    --accent: #2563eb; --accent-dim: rgba(37,99,235,0.12); --accent-glow: rgba(37,99,235,0.2);
    --green: #16a34a; --green-dim: rgba(22,163,74,0.12);
    --amber: #d97706; --amber-dim: rgba(217,119,6,0.12);
    --red: #dc2626; --red-dim: rgba(220,38,38,0.12);
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow: hidden; }

  /* ── UPLOAD SCREEN ── */
  #uploadScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; animation: fadeIn 0.4s ease; }
  #uploadScreen.hidden { display: none; }
  .upload-card { width: 500px; text-align: center; padding: 0 24px; }
  .upload-wordmark { font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 44px; font-family: var(--mono); }
  .upload-title { font-size: 34px; font-weight: 300; color: var(--text); margin-bottom: 8px; letter-spacing: -0.5px; }
  .upload-title span { color: var(--accent); font-weight: 500; }
  .upload-sub { font-size: 14px; color: var(--text2); margin-bottom: 36px; }

  .drop-area { border: 1.5px dashed var(--border2); border-radius: 20px; padding: 52px 32px; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; overflow: hidden; }
  .drop-area::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, var(--accent-dim), transparent 70%); opacity: 0; transition: opacity 0.3s; }
  .drop-area:hover::before, .drop-area.drag::before { opacity: 1; }
  .drop-area:hover, .drop-area.drag { border-color: var(--accent); transform: translateY(-2px); }
  .drop-icon { width: 56px; height: 56px; background: var(--accent-dim); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
  .drop-icon svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .drop-area h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .drop-area p { font-size: 13px; color: var(--text2); }
  .drop-area input { display: none; }

  /* backend URL input */
  .url-section { margin-top: 20px; text-align: left; }
  .url-label { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
  .url-input-wrap { display: flex; gap: 8px; align-items: center; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 14px; transition: border-color 0.2s; }
  .url-input-wrap:focus-within { border-color: rgba(91,141,239,0.4); }
  .url-input-wrap svg { width: 15px; height: 15px; stroke: var(--text3); fill: none; stroke-width: 2; flex-shrink: 0; }
  #backendUrl { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 12.5px; }
  #backendUrl::placeholder { color: var(--text3); }
  .url-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
  .url-hint code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); color: var(--text2); }

  .file-chosen { display: none; align-items: center; gap: 12px; background: var(--surface2); border-radius: 12px; padding: 14px 18px; margin-top: 16px; border: 1px solid var(--border2); }
  .file-chosen.show { display: flex; }
  .file-chosen-icon { width: 38px; height: 38px; background: var(--amber-dim); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .file-chosen-icon svg { width: 20px; height: 20px; stroke: var(--amber); fill: none; stroke-width: 1.8; }
  .file-chosen-name { font-size: 13px; font-weight: 500; flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chosen-size { font-size: 12px; color: var(--text2); font-family: var(--mono); }

  .start-btn { display: none; width: 100%; margin-top: 20px; padding: 14px; background: var(--accent); color: #fff; font-family: var(--font); font-size: 14px; font-weight: 500; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 0.02em; transition: all 0.2s; }
  .start-btn:hover { background: #6f9ef5; transform: translateY(-1px); }
  .start-btn.show { display: block; }

  /* ── CHAT SCREEN ── */
  #chatScreen { display: none; flex-direction: column; height: 100vh; }
  #chatScreen.show { display: flex; }

  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .topbar-badge { padding: 3px 10px; background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.2); border-radius: 99px; font-size: 11px; font-family: var(--mono); color: var(--amber); font-weight: 500; }
  .topbar-filename { font-size: 13px; color: var(--text2); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-url { font-size: 11px; font-family: var(--mono); color: var(--text3); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.thinking { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .messages { flex: 1; overflow-y: auto; padding: 32px 0; display: flex; flex-direction: column; gap: 0; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  .msg-wrap { padding: 6px 24px; max-width: 820px; width: 100%; margin: 0 auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .user-msg { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  .user-bubble { background: var(--accent-dim); border: 1px solid rgba(91,141,239,0.2); border-radius: 18px 18px 4px 18px; padding: 10px 16px; font-size: 14px; max-width: 72%; color: var(--text); }

  /* answer card with 3 rows */
  .answer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-top: 4px; }
  .answer-section { padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .answer-section:last-child { border-bottom: none; }
  .section-label { display: flex; align-items: center; gap: 7px; font-size: 10px; font-family: var(--mono); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .section-label-dot { width: 5px; height: 5px; border-radius: 50%; }
  .dot-answer { background: var(--accent); }
  .dot-summary { background: var(--green); }
  .dot-followup { background: var(--amber); }
  .answer-text { font-size: 14.5px; line-height: 1.75; color: var(--text); }
  .source-ref { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; font-size: 11px; font-family: var(--mono); color: var(--text2); }
  .summary-text { font-size: 13.5px; line-height: 1.7; color: var(--text2); }
  .summary-bullets { margin: 0; padding-left: 18px; color: var(--text2); }
  .summary-bullets li { margin-bottom: 8px; font-size: 13.5px; line-height: 1.7; }

  /* follow-up pills — horizontal row */
  .followup-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .followup-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 99px; font-size: 12.5px; color: var(--text2); cursor: pointer; transition: all 0.18s; font-family: var(--font); text-align: left; }
  .followup-pill:hover { background: var(--accent-dim); border-color: rgba(91,141,239,0.35); color: var(--text); transform: translateY(-1px); }
  .followup-pill:disabled { opacity: 0.35; pointer-events: none; }
  .followup-pill svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; opacity: 0.6; }

  .typing-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 24px; display: flex; align-items: center; gap: 6px; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.3s infinite; }
  .typing-dot:nth-child(2){animation-delay:.15s} .typing-dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .input-bar { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .input-inner { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border2); border-radius: 16px; padding: 10px 10px 10px 18px; transition: border-color 0.2s; }
  .input-inner:focus-within { border-color: rgba(91,141,239,0.4); }
  #chatInput { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; resize: none; min-height: 24px; max-height: 140px; }
  #chatInput::placeholder { color: var(--text3); }
  #chatInput:disabled { opacity: 0.5; cursor: not-allowed; }
  #sendBtn { width: 36px; height: 36px; flex-shrink: 0; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  #sendBtn:hover:not(:disabled) { background: #6f9ef5; }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.2; }

  .indexing-msg { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; display: flex; align-items: center; gap: 14px; }
  .index-spinner { width: 28px; height: 28px; flex-shrink: 0; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .index-text { font-size: 14px; color: var(--text2); }
  .index-text strong { color: var(--text); font-weight: 500; }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
  <div class="upload-card">
    <div class="upload-wordmark">PDF · Chat · RAG Pipeline</div>
    <h1 class="upload-title">Ask your <span>document</span><br>anything</h1>
    <p class="upload-sub">Powered by your Colab pipeline — PyMuPDF + FAISS + Groq</p>

    <div class="url-section">
      <div class="url-label">Colab Backend URL</div>
      <div class="url-input-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        <input type="text" id="backendUrl" placeholder="https://xxxx-xx-xx-xx-xx.ngrok-free.app" autocomplete="off" spellcheck="false">
      </div>
      <div class="url-hint">Run <code>Section C</code> in your Colab notebook → copy the printed URL → paste above</div>
    </div>

    <div class="drop-area" id="dropArea" style="margin-top:20px"
      onclick="document.getElementById('fileInput').click()"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <h3>Drop your PDF here</h3>
      <p>Same file you uploaded in Colab</p>
      <input type="file" id="fileInput" accept=".pdf" onchange="onFileChosen(event)">
    </div>

    <div class="file-chosen" id="fileChosen">
      <div class="file-chosen-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span class="file-chosen-name" id="chosenName"></span>
      <span class="file-chosen-size" id="chosenSize"></span>
    </div>

    <button class="start-btn" id="startBtn" onclick="startChat()">Connect & start chatting →</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <div class="topbar">
    <span class="topbar-badge">PDF</span>
    <span class="topbar-filename" id="topbarFilename"></span>
    <span class="topbar-url" id="topbarUrl"></span>
    <div class="topbar-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <div class="input-inner">
      <textarea id="chatInput" placeholder="Ask anything about your document…" rows="1"
        onkeydown="onKey(event)" oninput="autoGrow(this)" disabled></textarea>
      <button id="sendBtn" onclick="sendMsg()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
// You can hard-code your ngrok URL here if you want:
// const BACKEND_URL = "https://xxxx-xxxx.ngrok-free.app";
let BACKEND_URL = "";

let fileName = '';
let busy = false;

// ── FILE PICKING ──
function onDragOver(e) { e.preventDefault(); document.getElementById('dropArea').classList.add('drag'); }
function onDragLeave(e) { document.getElementById('dropArea').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropArea').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadFile(f);
}
function onFileChosen(e) { const f = e.target.files[0]; if (f) loadFile(f); }

function loadFile(file) {
  fileName = file.name;
  document.getElementById('chosenName').textContent = file.name;
  document.getElementById('chosenSize').textContent = (file.size/1024).toFixed(0) + ' KB';
  document.getElementById('fileChosen').classList.add('show');
  checkCanStart();
}

function checkCanStart() {
  const url = document.getElementById('backendUrl').value.trim();
  const hasFile = !!fileName;
  const hasUrl = url.startsWith('http');
  document.getElementById('startBtn').classList.toggle('show', hasFile && hasUrl);
}
document.getElementById('backendUrl').addEventListener('input', checkCanStart);

// ── START CHAT ──
async function startChat() {
  BACKEND_URL = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  document.getElementById('uploadScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.add('show');
  document.getElementById('topbarFilename').textContent = fileName;
  document.getElementById('topbarUrl').textContent = BACKEND_URL.replace('https://','');
  setStatus('thinking', 'connecting…');
  addIndexingMsg();
  await checkBackend();
}

async function checkBackend() {
  try {
    const resp = await fetch(BACKEND_URL + '/status');
    const data = await resp.json();
    removeIndexingMsg();
    if (data.status === 'ready') {
      setStatus('ready', 'ready');
      document.getElementById('chatInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').focus();
      appendSystemNote(`Connected to pipeline. Document: ${data.document || fileName}. Ask anything!`);
    } else {
      setStatus('error', 'error');
      appendSystemNote('Pipeline not ready. Make sure you ran all cells in Colab first.');
    }
  } catch(e) {
    removeIndexingMsg();
    setStatus('error', 'unreachable');
    appendSystemNote('Cannot reach backend. Check the ngrok URL and make sure the Colab server cell is running.');
  }
}

// ── SEND MESSAGE ──
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }

async function sendMsg(question) {
  const inp = document.getElementById('chatInput');
  const q = question || inp.value.trim();
  if (!q || busy) return;

  busy = true;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('chatInput').disabled = true;
  setStatus('thinking', 'thinking…');

  appendUserMsg(q);
  const tid = appendTyping();

  try {
    const resp = await fetch(BACKEND_URL + '/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await resp.json();

    removeTyping(tid);
    if (data.error) {
      appendSystemNote('Error: ' + data.error);
    } else {
      appendAnswerCard(data);
    }
  } catch(e) {
    removeTyping(tid);
    appendSystemNote('Request failed. Is the Colab cell still running?');
  }

  setStatus('ready', 'ready');
  busy = false;
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

// ── DOM HELPERS ──
function scrollBottom() { const m = document.getElementById('messages'); setTimeout(() => m.scrollTop = m.scrollHeight, 50); }

function appendUserMsg(text) {
  const w = mk('div','msg-wrap');
  w.innerHTML = `<div class="user-msg"><div class="user-bubble">${esc(text)}</div></div>`;
  document.getElementById('messages').appendChild(w); scrollBottom();
}

function appendAnswerCard(p) {
  const followupsHtml = (p.followups||[]).map(q => `
    <button class="followup-pill" onclick="clickFollowup(this,'${esc(q)}')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      ${esc(q)}
    </button>`).join('');

  const w = mk('div','msg-wrap');
  w.innerHTML = `
    <div class="answer-card">
      <div class="answer-section">
        <div class="section-label"><span class="section-label-dot dot-answer"></span>answer</div>
        <div class="answer-text">${p.answer||''}</div>
        ${p.source ? `<div class="source-ref">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          ${esc(p.source)}
        </div>` : ''}
      </div>
      ${p.summary ? `<div class="answer-section">
        <div class="section-label"><span class="section-label-dot dot-summary"></span>summary</div>
        <div class="summary-bullets"><ul>${renderSummaryBullets(p.summary)}</ul></div>
      </div>` : ''}
      ${followupsHtml ? `<div class="answer-section">
        <div class="section-label"><span class="section-label-dot dot-followup"></span>follow-up questions</div>
        <div class="followup-row">${followupsHtml}</div>
      </div>` : ''}
    </div>`;
  document.getElementById('messages').appendChild(w); scrollBottom();
}

function renderSummaryBullets(text) {
  const raw = String(text || '').trim().replace(/\r/g, '');
  let lines = raw.split(/\n+/).map(line => line.trim()).filter(Boolean);

  if (lines.length === 1) {
    lines = raw.split(/(?<=[.?!])\s+(?=[A-Z0-9])/g).map(line => line.trim()).filter(Boolean);
  }

  if (lines.length < 3) {
    lines = lines.flatMap(line => line.split(/[,;]+\s*/).map(chunk => chunk.trim())).filter(Boolean);
  }

  if (lines.length < 3) {
    lines = lines.flatMap(line => line.split(/\s+(?:and|or)\s+/i).map(chunk => chunk.trim())).filter(Boolean);
  }

  const bullets = [];
  for (const line of lines) {
    const clean = line.replace(/^[-*•\s]+/, '').replace(/\s+/g, ' ').trim();
    if (!clean) continue;
    if (clean.length <= 80) {
      bullets.push(clean);
      continue;
    }
    const parts = clean.split(/,\s+/).map(part => part.trim()).filter(Boolean);
    if (parts.length > 1) {
      bullets.push(...parts);
      continue;
    }
    const wrapped = clean.match(/.{1,70}(?:\s|$)/g) || [clean];
    wrapped.forEach(part => {
      const trimmed = part.trim();
      if (trimmed) bullets.push(trimmed);
    });
  }

  while (bullets.length < 3 && bullets.some(b => b.length > 40)) {
    const index = bullets.findIndex(b => b.length > 40);
    if (index === -1) break;
    const chunk = bullets.splice(index, 1)[0];
    const split = chunk.split(/,\s+|;\s+|\s+(?:and|or)\s+/i).map(part => part.trim()).filter(Boolean);
    if (split.length > 1) bullets.splice(index, 0, ...split);
    else bullets.splice(index, 0, chunk);
  }

  return bullets.slice(0, 6).map(line => `<li>${esc(line)}</li>`).join('');
}

function clickFollowup(btn, q) {
  btn.closest('.answer-card').querySelectorAll('.followup-pill').forEach(p => p.disabled = true);
  const inp = document.getElementById('chatInput');
  inp.value = q; autoGrow(inp);
  setTimeout(() => sendMsg(q), 350);
}

function addIndexingMsg() {
  const w = mk('div','msg-wrap'); w.id = 'indexingMsg';
  w.innerHTML = `<div class="indexing-msg"><div class="index-spinner"></div><div class="index-text"><strong>Connecting to pipeline</strong> — verifying Colab backend…</div></div>`;
  document.getElementById('messages').appendChild(w); scrollBottom();
}
function removeIndexingMsg() { const el = document.getElementById('indexingMsg'); if(el) el.remove(); }

function appendTyping() {
  const id = 'ty'+Date.now(), w = mk('div','msg-wrap'); w.id = id;
  w.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  document.getElementById('messages').appendChild(w); scrollBottom(); return id;
}
function removeTyping(id) { const el = document.getElementById(id); if(el) el.remove(); }

function appendSystemNote(text) {
  const w = mk('div','msg-wrap');
  w.innerHTML = `<div style="text-align:center;font-size:12px;color:var(--text3);padding:6px 0">${esc(text)}</div>`;
  document.getElementById('messages').appendChild(w); scrollBottom();
}

function setStatus(type, text) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = text;
}
function mk(tag, cls) { const el = document.createElement(tag); if(cls) el.className = cls; return el; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>
